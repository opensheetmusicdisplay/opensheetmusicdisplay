name: CI
# replaces .appveyor

on:
  [push, pull_request] # (all branches)
  #branches: [develop, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package.json') }}

      - name: Install dependencies
        run: npm install

      # - name: Lint # included in npm install
      #   run: npm run lint

      # - name: Patch VexFlow # included in npm install, npm run build
      #   run: npm run prebuildVexflow

      # - name: Build
      #   run: npm run build # included in npm install

      - name: Test
        run: npx vitest run --maxWorkers=2
        env:
          CI: true